<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px;
      background: #f7f7f7;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 18px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <h1 id="result">Calculating results...</h1>
  <p id="message"></p>
  
<p style="font-size:20px; margin-bottom:20px;">
  Choose again?
</p>

  <a href="index.html" class="btn">Try another question</a>

  <script>
    // 🔹 Supabase 정보 입력 (여기 수정)
    const SUPABASE_URL = "https://kxyudttxvsmtgygqustx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ezZjBN_gP6mx2V0eAsl_9A_E-6Z6ZtT";

    // 🔹 URL에서 값 가져오기
    const params = new URLSearchParams(window.location.search);
    const qid = params.get("question_id");
    const oid = params.get("option_id");

    async function loadResult() {
      try {
        // 🔹 해당 질문 데이터 가져오기
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/votes?question_id=eq.${qid}`,
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + SUPABASE_KEY
            }
          }
        );

        const data = await res.json();

        const total = data.length;

        // 선택한 옵션 개수
        const selected = data.filter(x => x.option_id == oid).length;

        // 예외 처리
        if (total === 0) {
          document.getElementById("result").innerText = "No data yet";
          return;
        }

        const percent = Math.round((selected / total) * 100);

        // 🔹 결과 출력
        document.getElementById("result").innerText =
          percent + "% chose this option";

        // 🔹 추가 메시지 (구간별)
        let message = "";

        if (percent < 20) {
          message = "Rare choice";
        } else if (percent < 40) {
          message = "Less common";
        } else if (percent < 60) {
          message = "Balanced";
        } else if (percent < 80) {
          message = "Popular choice";
        } else {
          message = "Most people chose this";
        }

        document.getElementById("message").innerText = message;

      } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error loading result";
      }
    }

    loadResult();
  </script>

</body>
</html>
