<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px;
      background: #f7f7f7;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 18px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <h1 id="result">Calculating results...</h1>
  <p id="message"></p>

  <p style="font-size:20px; margin-bottom:20px;">
    Choose again?
  </p>

  <a href="index.html" class="btn">Try another question</a>

  <script>
    const SUPABASE_URL = "https://kxyudttxvsmtgygqustx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ezZjBN_gP6mx2V0eAsl_9A_E-6Z6ZtT";

    const params = new URLSearchParams(window.location.search);

    // 🔴 타입 강제 변환 (핵심)
    const qid = String(params.get("question_id"));
    const oid = Number(params.get("option_id"));

    async function loadResult() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/votes?question_id=eq.${qid}`,
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + SUPABASE_KEY
            },
            cache: "no-store"
          }
        );

        const data = await res.json();

        const total = data.length;

        if (total === 0) {
          document.getElementById("result").innerText = "No data yet";
          return;
        }

        // 🔴 숫자로 맞춰서 비교 (핵심)
        const selected = data.filter(x => Number(x.option_id) === oid).length;

        const percent = Math.round((selected / total) * 100);

        document.getElementById("result").innerText =
          percent + "% chose this option";

        let message = "";

        if (percent < 20) message = "Rare choice";
        else if (percent < 40) message = "Less common";
        else if (percent < 60) message = "Balanced";
        else if (percent < 80) message = "Popular choice";
        else message = "Most people chose this";

        document.getElementById("message").innerText = message;

      } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error loading result";
      }
    }

    loadResult();
  </script>

</body>
</html>
