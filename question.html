<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f7f7f7;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 30px;
    }

    .option {
      display: block;
      width: 80%;
      max-width: 400px;
      margin: 10px auto;
      padding: 15px;
      font-size: 16px;
      border: none;
      background: #ffffff;
      border-radius: 8px;
      cursor: pointer;
    }

    .option:hover {
      background: #eaeaea;
    }
  </style>
</head>
<body>

  <h2 id="question">Loading...</h2>
  <div id="options"></div>

  <!-- 질문 데이터 -->
  <script src="questions.js"></script>

  <script>
    // 🔹 Supabase 정보 입력 (여기만 수정)
    const SUPABASE_URL = "https://kxyudttxvsmtgygqustx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4eXVkdHR4dnNtdGd5Z3F1c3R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjg4NzEsImV4cCI6MjA5MDYwNDg3MX0.Sj-ort6WEMDm1tYfyU-MyA2qbeMHeqgfz8DqMyZQAKA";

    // 🔹 URL에서 question_id 가져오기
    const params = new URLSearchParams(window.location.search);
    const qid = params.get("id");

    // 🔹 해당 질문 찾기
    const q = questions.find(item => item.id === qid);

    // 예외 처리
    if (!q) {
      document.getElementById("question").innerText = "Question not found";
    } else {
      document.getElementById("question").innerText = q.question;

      const container = document.getElementById("options");

      q.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "option";

        btn.onclick = async () => {
          try {
            // 🔹 Supabase에 저장
            await fetch(`${SUPABASE_URL}/rest/v1/votes`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_KEY,
                "Authorization": "Bearer " + SUPABASE_KEY
              },
              body: JSON.stringify({
                question_id: qid,
                option_id: index+1
              })
            });

            // 🔹 결과 페이지 이동
            window.location.href =
              `result.html?question_id=${qid}&option_id=${index+1}`;

          } catch (error) {
            alert("Error saving data");
            console.error(error);
          }
        };

        container.appendChild(btn);
      });
    }
  </script>

</body>
</html>
