<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

  <p>Loading question...</p>

  <!-- 질문 데이터 -->
  <script src="questions.js"></script>

  <script>
    // 🔹 questions.js 로드 확인
    if (!questions || questions.length === 0) {
      document.body.innerHTML = "No questions available";
    } else {
      // 🔹 랜덤 선택
      const randomIndex = Math.floor(Math.random() * questions.length);
      const selected = questions[randomIndex];

      // 🔹 question 페이지로 이동
      window.location.href = "question.html?id=" + selected.id;
    }
  </script>

</body>
</html>
