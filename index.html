<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poll</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  background: #f5f5f5;
}

#container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h2 {
  font-size: 20px;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
}

#result {
  font-size: 42px;
  font-weight: bold;
  margin-top: 20px;
}

/* 🔥 블록 그래프 */
.bar {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 20px;
}

.block {
  width: 22px;
  height: 22px;
  background: #eee;
  border-radius: 4px;
}

/* 구간 색 */
.red    { background: #f8b4b4; }
.yellow { background: #fde68a; }
.green  { background: #86efac; }

.active {
  filter: brightness(0.9);
}

#subtext {
  margin-top: 10px;
  color: #666;
}

#nextBtn {
  margin-top: 20px;
  background: #007bff;
}
</style>
</head>
<body>

<div id="container"></div>

<script src="questions.js"></script>

<script>
const SUPABASE_URL = "https://foafvsaggjaaewdchfsj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ttAwXXUz_ODPDayrjV8X7A_5tB_hCPf";

/* user_id */
let userId = localStorage.getItem("user_id");
if (!userId) {
  userId = 'u_' + Date.now() + Math.random().toString(36).substring(2);
  localStorage.setItem("user_id", userId);
}

/* 셔플 */
let shuffled = JSON.parse(localStorage.getItem("shuffled") || "null");
let index = parseInt(localStorage.getItem("qIndex") || "0");

function shuffleQuestions() {
  return [...questions].sort(() => Math.random() - 0.5);
}

if (!shuffled) {
  shuffled = shuffleQuestions();
  localStorage.setItem("shuffled", JSON.stringify(shuffled));
}

function getNextQuestion() {
  if (index >= shuffled.length) {
    shuffled = shuffleQuestions();
    index = 0;
  }
  const q = shuffled[index++];
  localStorage.setItem("qIndex", index);
  return q;
}

/* 문제 */
function showQuestion() {
  const q = getNextQuestion();
  const container = document.getElementById("container");

  container.innerHTML = `<h2>${q.question}</h2>`;

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = opt;

    let clicked = false;

    btn.addEventListener("click", () => {
      if (clicked) return;
      clicked = true;
      vote(q.id, i);
    });

    container.appendChild(btn);
  });
}

/* 🔥 블록 렌더 */
function renderBlocks(percent) {
  const blocks = document.querySelectorAll(".block");
  const activeCount = Math.round(percent / 10);

  blocks.forEach((b, i) => {
    if (i < activeCount) b.classList.add("active");
    else b.classList.remove("active");
  });
}

/* 결과 */
function showResult(percent) {

  const barHTML = `
    <div class="bar">
      <div class="block red"></div>
      <div class="block red"></div>
      <div class="block red"></div>

      <div class="block yellow"></div>
      <div class="block yellow"></div>
      <div class="block yellow"></div>

      <div class="block green"></div>
      <div class="block green"></div>
      <div class="block green"></div>
      <div class="block green"></div>
    </div>
  `;

  document.getElementById("container").innerHTML = `
    <div id="result">${percent}% chose this option</div>
    ${barHTML}
    <div id="subtext">See how you compare</div>
    <button id="nextBtn">Try another question</button>
  `;

  renderBlocks(percent);

  document.getElementById("nextBtn").addEventListener("click", showQuestion);
}

/* 투표 */
function vote(qid, optionId) {

  let percent = (30 + Math.random() * 40).toFixed(1);
  showResult(percent);

  fetch(SUPABASE_URL + "/rest/v1/votes", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      question_id: qid,
      option_id: optionId,
      user_id: userId
    })
  }).catch(() => {});

  fetch(
    SUPABASE_URL + `/rest/v1/votes?question_id=eq.${qid}`,
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  )
  .then(res => res.json())
  .then(data => {

    if (!data || data.length === 0) return;

    const total = data.length;
    const selected = data.filter(v => v.option_id === optionId).length;

    const base = 4.2;

    const realPercent = (
      (selected + Math.random()) / (total + base) * 100
    ).toFixed(1);

    document.getElementById("result").innerText =
      realPercent + "% chose this option";

    renderBlocks(realPercent); // 🔥 여기 중요
  })
  .catch(() => {});
}

/* 시작 */
showQuestion();
</script>

</body>
</html>
