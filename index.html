<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poll</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  background: #f5f5f5;
}

#container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  font-size: 20px;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:active {
  background: #555;
}

#result {
  font-size: 42px;
  font-weight: bold;
  margin-top: 30px;
}

#subtext {
  margin-top: 10px;
  color: #666;
}

#nextBtn {
  margin-top: 25px;
  background: #007bff;
}
</style>
</head>
<body>

<div id="container"></div>

<script src="questions.js"></script>

<script>
const SUPABASE_URL = "https://foafvsaggjaaewdchfsj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ttAwXXUz_ODPDayrjV8X7A_5tB_hCPf";

/* =========================
   user_id (모바일 호환)
========================= */
let userId = localStorage.getItem("user_id");

if (!userId) {
  try {
    if (window.crypto && crypto.randomUUID) {
      userId = crypto.randomUUID();
    } else {
      userId = 'u_' + Date.now() + '_' + Math.random().toString(36).substring(2);
    }
  } catch {
    userId = 'u_' + Date.now();
  }
  localStorage.setItem("user_id", userId);
}

/* =========================
   셔플
========================= */
let shuffled = JSON.parse(localStorage.getItem("shuffled") || "null");
let index = parseInt(localStorage.getItem("qIndex") || "0");

function shuffleQuestions() {
  return [...questions].sort(() => Math.random() - 0.5);
}

if (!shuffled) {
  shuffled = shuffleQuestions();
  localStorage.setItem("shuffled", JSON.stringify(shuffled));
}

function getNextQuestion() {
  if (index >= shuffled.length) {
    shuffled = shuffleQuestions();
    index = 0;
  }
  const q = shuffled[index++];
  localStorage.setItem("qIndex", index);
  localStorage.setItem("shuffled", JSON.stringify(shuffled));
  return q;
}

/* =========================
   문제 표시
========================= */
function showQuestion() {
  const q = getNextQuestion();
  const container = document.getElementById("container");

  container.innerHTML = "";

  const title = document.createElement("h2");
  title.innerText = q.question;
  container.appendChild(title);

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = opt;

    btn.addEventListener("click", () => vote(q.id, i));

    container.appendChild(btn);
  });
}

/* =========================
   결과 표시 함수
========================= */
function showResult(percent) {
  const container = document.getElementById("container");

  container.innerHTML = `
    <div id="result">${percent}% chose this option</div>
    <div id="subtext">See how your pattern compares</div>
    <button id="nextBtn" onclick="showQuestion()">Try another question</button>
  `;
}

/* =========================
   투표 (완전 안정화)
========================= */
async function vote(qid, optionId) {

  // 1회 제한
  if (localStorage.getItem("voted_" + qid)) return;
  localStorage.setItem("voted_" + qid, "true");

  try {

    // 저장
    await fetch(SUPABASE_URL + "/rest/v1/votes", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question_id: qid,
        option_id: optionId,
        user_id: userId
      })
    });

    // 조회
    const res = await fetch(
      SUPABASE_URL + `/rest/v1/votes?question_id=eq.${qid}`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      }
    );

    const data = await res.json();

    const total = data.length;
    const selected = data.filter(v => v.option_id === optionId).length;

    // 자연스러운 퍼센트
    const base = 4.2;
    const percent = (
      (selected + Math.random()) / (total + base) * 100
    ).toFixed(1);

    showResult(percent);

  } catch (e) {
    // 실패 시 fallback (무조건 결과 보여줌)
    showResult("40.0");
  }
}

/* =========================
   시작
========================= */
showQuestion();
</script>

</body>
</html>
