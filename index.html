<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poll</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  background: #f5f5f5;
}

#container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h2 {
  font-size: 20px;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
}

#result {
  font-size: 42px;
  font-weight: bold;
  margin-top: 30px;
}

#subtext {
  margin-top: 10px;
  color: #666;
}

#nextBtn {
  margin-top: 20px;
  background: #007bff;
}
</style>
</head>
<body>

<div id="container"></div>

<script src="questions.js"></script>

<script>
const SUPABASE_URL = "https://foafvsaggjaaewdchfsj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ttAwXXUz_ODPDayrjV8X7A_5tB_hCPf";

/* user_id */
let userId = localStorage.getItem("user_id");
if (!userId) {
  userId = 'u_' + Date.now() + Math.random().toString(36).substring(2);
  localStorage.setItem("user_id", userId);
}

/* 셔플 */
let shuffled = JSON.parse(localStorage.getItem("shuffled") || "null");
let index = parseInt(localStorage.getItem("qIndex") || "0");

function shuffleQuestions() {
  return [...questions].sort(() => Math.random() - 0.5);
}

if (!shuffled) {
  shuffled = shuffleQuestions();
  localStorage.setItem("shuffled", JSON.stringify(shuffled));
}

function getNextQuestion() {
  if (index >= shuffled.length) {
    shuffled = shuffleQuestions();
    index = 0;
  }
  const q = shuffled[index++];
  localStorage.setItem("qIndex", index);
  return q;
}

/* 문제 */
function showQuestion() {
  const q = getNextQuestion();
  const container = document.getElementById("container");

  container.innerHTML = `<h2>${q.question}</h2>`;

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = opt;

    let clicked = false;

    btn.addEventListener("click", () => {
      if (clicked) return;
      clicked = true;

      vote(q.id, i);
    });

    container.appendChild(btn);
  });
}

/* 결과 */
function showResult(percent) {
  document.getElementById("container").innerHTML = `
    <div id="result">${percent}% chose this option</div>
    <div id="subtext">See how you compare</div>
    <button id="nextBtn">Try another question</button>
  `;

  document.getElementById("nextBtn").addEventListener("click", showQuestion);
}

/* 투표 */
function vote(qid, optionId) {

  /* 1️⃣ 즉시 표시용 (랜덤) */
  let percent = (30 + Math.random() * 40).toFixed(1);
  showResult(percent);

  /* 2️⃣ 서버 저장 */
  fetch(SUPABASE_URL + "/rest/v1/votes", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      question_id: qid,
      option_id: optionId,
      user_id: userId
    })
  }).catch(() => {});

  /* 3️⃣ 실제 데이터로 보정 */
  fetch(
    SUPABASE_URL + `/rest/v1/votes?question_id=eq.${qid}`,
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  )
  .then(res => res.json())
  .then(data => {

    if (!data || data.length === 0) return;

    const total = data.length;
    const selected = data.filter(v => v.option_id === optionId).length;

    const base = 4.2;

    const realPercent = (
      (selected + Math.random()) / (total + base) * 100
    ).toFixed(1);

    /* ⭐ 화면 업데이트 */
    document.getElementById("result").innerText =
      realPercent + "% chose this option";

  })
  .catch(() => {});
}

/* 시작 */
showQuestion();
</script>

</body>
</html>
